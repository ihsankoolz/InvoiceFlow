name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check ."

  test-temporal-worker:
    name: Test temporal-worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: temporal-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v

  test-bidding-service:
    name: Test bidding-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/bidding-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio
      - name: Run tests
        run: pytest tests/ -v --ignore=tests/integration

  test-invoice-service:
    name: Test invoice-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/invoice-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio
      - name: Run tests
        run: pytest tests/ -v --ignore=tests/integration
