_format_version: "3.0"

# ============================================================
# Consumers & JWT Credentials (required for DB-less JWT auth)
# Kong needs a consumer with a JWT credential whose secret
# matches the JWT_SECRET used by the user-service.
# The user-service must include `iss: "invoiceflow"` in the
# JWT payload so Kong knows which credential to validate with.
# ============================================================
consumers:
  - username: invoiceflow-app
    jwt_secrets:
      - key: invoiceflow                          # must match `iss` claim in JWT
        secret: ${JWT_SECRET}                          # must match JWT_SECRET env var
        algorithm: HS256

services:
  # --- Auth (no JWT) ---
  - name: auth-service
    url: http://user-service:5000
    plugins:
      - name: rate-limiting
        config:
          minute: 10
          policy: local
    routes:
      - name: auth-routes
        paths:
          - /api/auth
        methods:
          - POST
        strip_path: true

  # --- Invoice Orchestrator (JWT required) ---
  - name: invoice-orchestrator
    url: http://invoice-orchestrator:5010
    plugins:
      - name: jwt
        config:
          key_claim_name: iss
          claims_to_verify:
            - exp
    routes:
      - name: invoice-extract
        paths:
          - /api/invoices/extract
        methods:
          - POST
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 20
              policy: local
      - name: invoice-create
        paths:
          - /api/invoices
        methods:
          - POST
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 20
              policy: local
      - name: invoice-list
        paths:
          - /api/invoices
        methods:
          - GET
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 100
              policy: local

  # --- Bidding Orchestrator (JWT required on bids + wallet) ---
  - name: bidding-orchestrator
    url: http://bidding-orchestrator:5011
    plugins:
      - name: jwt
        config:
          key_claim_name: iss
          claims_to_verify:
            - exp
    routes:
      - name: place-bid
        paths:
          - /api/bids
        methods:
          - POST
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 30
              policy: local
      - name: bids-list
        paths:
          - /api/bids
        methods:
          - GET
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 100
              policy: local
      - name: wallet-topup
        paths:
          - /api/wallet/topup
        methods:
          - POST
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 5
              policy: local
      - name: wallet-balance
        paths:
          - /api/wallet/balance
        methods:
          - GET
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 100
              policy: local
      - name: wallet-transactions
        paths:
          - /api/wallet/transactions
        methods:
          - GET
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 100
              policy: local
      - name: wallet-locked
        paths:
          - /api/wallet/locked
        methods:
          - GET
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 100
              policy: local

  # --- Marketplace Listings (JWT required — read model, no N+1) ---
  - name: marketplace-listings
    url: http://marketplace-service:5002
    plugins:
      - name: jwt
        config:
          key_claim_name: iss
          claims_to_verify:
            - exp
    routes:
      - name: listings
        paths:
          - /api/listings
        methods:
          - GET
        strip_path: false
      - name: listing-detail
        paths:
          - ~/api/listings/[^/]+$
        methods:
          - GET
        strip_path: false

  # --- Stripe Webhook → webhook-router (no JWT — uses Stripe signature) ---
  - name: stripe-webhook
    url: http://webhook-router:5013
    routes:
      - name: stripe-webhook-route
        paths:
          - /api/webhooks/stripe
        methods:
          - POST
        strip_path: false

  # --- DLQ Monitor (JWT required — internal ops endpoint) ---
  - name: dlq-monitor
    url: http://dlq-monitor:5014
    plugins:
      - name: jwt
        config:
          key_claim_name: iss
          claims_to_verify:
            - exp
    routes:
      - name: dlq-status
        paths:
          - ~/api/dlq
        methods:
          - GET
        strip_path: false

  # --- Loan Orchestrator (JWT required) ---
  - name: loan-orchestrator
    url: http://loan-orchestrator:5012
    plugins:
      - name: jwt
        config:
          key_claim_name: iss
          claims_to_verify:
            - exp
    routes:
      - name: loans-list
        paths:
          - /api/loans
        methods:
          - GET
        strip_path: false
      - name: loan-repay
        paths:
          - ~/api/loans/[^/]+/repay$
        methods:
          - POST
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 10
              policy: local
      - name: loan-confirm-repayment
        paths:
          - ~/api/loans/[^/]+/confirm-repayment$
        methods:
          - POST
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 10
              policy: local

  # --- Notification Service (JWT required, direct to atomic) ---
  - name: notification-service
    url: http://notification-service:5005
    plugins:
      - name: jwt
        config:
          key_claim_name: iss
          claims_to_verify:
            - exp
    routes:
      - name: notifications-read
        paths:
          - /api/notifications
        methods:
          - GET
        strip_path: false
      - name: notifications-mark-read
        paths:
          - /api/notifications
        methods:
          - PATCH
        strip_path: false


plugins:
  # CORS — global
  - name: cors
    config:
      origins:
        - "http://localhost:3000"
        - "https://invoiceflowsga.vercel.app"
      methods:
        - GET
        - POST
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - X-Correlation-ID
      credentials: true
      max_age: 3600

  # Correlation ID — global
  - name: correlation-id
    config:
      header_name: X-Correlation-ID
      generator: uuid
      echo_downstream: true
