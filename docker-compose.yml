version: "3.8"

services:
  # ============================================================
  # INFRASTRUCTURE
  # ============================================================

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    command: >
      sh -c "rabbitmq-plugins enable rabbitmq_prometheus && rabbitmq-server"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  temporal:
    image: temporalio/auto-setup:1.24
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
    depends_on:
      temporal-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:2.26.2
    ports:
      - "8088:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      temporal:
        condition: service_healthy

  kong:
    image: kong:3.4
    entrypoint: ["/bin/sh", "-c", "sed \"s|\\$${JWT_SECRET}|$$JWT_SECRET|g\" /etc/kong/kong.yml.template > /etc/kong/kong.yml && /docker-entrypoint.sh kong docker-start"]
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_LOG_LEVEL: info
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8000:8000"
    volumes:
      - ./gateway/kong.yml:/etc/kong/kong.yml.template
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  activity-log-bridge:
      build: ./services/activity-log-bridge
      container_name: activity-log-bridge
      restart: always
      environment:
        - RABBITMQ_HOST=rabbitmq
        - OUTSYSTEMS_URL=${OUTSYSTEMS_API_URL}
      volumes:
        - ./shared:/app/shared
      depends_on:
        rabbitmq:
          condition: service_healthy

  # ============================================================
  # DATABASES
  # ============================================================

  temporal-db:
    image: postgres:13
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s

  user-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: user_db
    ports:
      - "3306:3306"
    volumes:
      - ./databases/user-db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - user-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysql -uroot -ppassword user_db -e 'SELECT 1' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s

  invoice-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: invoice_db
    ports:
      - "3307:3306"
    volumes:
      - ./databases/invoice-db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - invoice-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysql -uroot -ppassword invoice_db -e 'SELECT 1' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s

  market-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: market_db
    ports:
      - "3308:3306"
    volumes:
      - ./databases/market-db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - market-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysql -uroot -ppassword market_db -e 'SELECT 1' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s

  bidding-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: bidding_db
    ports:
      - "3309:3306"
    volumes:
      - ./databases/bidding-db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - bidding-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysql -uroot -ppassword bidding_db -e 'SELECT 1' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s

  payment-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: payment_db
    ports:
      - "3310:3306"
    volumes:
      - ./databases/payment-db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - payment-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysql -uroot -ppassword payment_db -e 'SELECT 1' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s

  # ============================================================
  # ATOMIC SERVICES
  # ============================================================

  user-service:
    build: ./services/user-service
    ports:
      - "5000:5000"
    environment:
      DB_URL: mysql+pymysql://root:password@user-db:3306/user_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      JWT_EXPIRY_HOURS: "24"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
    depends_on:
      user-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  invoice-service:
    build: ./services/invoice-service
    ports:
      - "5001:5001"
    environment:
      DB_URL: mysql+pymysql://root:password@invoice-db:3306/invoice_db
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: invoices
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
    depends_on:
      invoice-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  marketplace-service:
    build: ./services/marketplace-service
    ports:
      - "5002:5002"
    environment:
      DB_URL: mysql+pymysql://root:password@market-db:3306/market_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
    depends_on:
      rabbitmq:
        condition: service_healthy
      market-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5002/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  bidding-service:
    build: ./services/bidding-service
    ports:
      - "5003:5003"
    environment:
      DB_URL: mysql+pymysql://root:password@bidding-db:3306/bidding_db
    volumes:
      - ./shared:/app/shared
    depends_on:
      bidding-db:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5003/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  payment-service:
    build: ./services/payment-service
    ports:
      - "5004:5004"
      - "50051:50051"
    environment:
      DB_URL: mysql://root:password@payment-db:3306/payment_db
      GRPC_PORT: "50051"
      REST_PORT: "5004"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      payment-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5004/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  notification-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: notification_db
    ports:
      - "3311:3306"
    volumes:
      - notification-db-data:/var/lib/mysql
      - ./databases/notification-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-service:
    build: ./services/notification-service
    ports:
      - "5005:5005"
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-onboarding@resend.dev}
      DB_URL: mysql+pymysql://root:password@notification-db:3306/notification_db
    volumes:
      - ./shared:/app/shared
    depends_on:
      rabbitmq:
        condition: service_healthy
      notification-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5005/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ============================================================
  # COMPOSITE SERVICES (ORCHESTRATORS)
  # ============================================================

  user-orchestrator:
    build: ./orchestrators/user-orchestrator
    ports:
      - "5015:5015"
    environment:
      USER_SERVICE_URL: http://user-service:5000
      ACRA_WRAPPER_URL: http://acra-wrapper:5007
    depends_on:
      user-service:
        condition: service_healthy
      acra-wrapper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5015/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  invoice-orchestrator:
    build: ./orchestrators/invoice-orchestrator
    ports:
      - "5010:5010"
    environment:
      USER_SERVICE_URL: http://user-service:5000
      INVOICE_SERVICE_URL: http://invoice-service:5001
      MARKETPLACE_SERVICE_URL: http://marketplace-service:5002
      ACRA_WRAPPER_URL: http://acra-wrapper:5007
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      TEMPORAL_HOST: temporal:7233
    volumes:
      - ./shared:/app/shared
    depends_on:
      user-service:
        condition: service_healthy
      invoice-service:
        condition: service_healthy
      marketplace-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5010/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  bidding-orchestrator:
    build: ./orchestrators/bidding-orchestrator
    ports:
      - "5011:5011"
    environment:
      BIDDING_SERVICE_URL: http://bidding-service:5003
      MARKETPLACE_SERVICE_URL: http://marketplace-service:5002
      INVOICE_SERVICE_URL: http://invoice-service:5001
      STRIPE_WRAPPER_URL: http://stripe-wrapper:5008
      PAYMENT_SERVICE_GRPC: payment-service:50051
      PAYMENT_SERVICE_URL: http://payment-service:5004
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      TEMPORAL_HOST: temporal:7233
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      USER_SERVICE_URL: http://user-service:5000
    volumes:
      - ./shared:/app/shared
    depends_on:
      bidding-service:
        condition: service_healthy
      marketplace-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5011/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  loan-orchestrator:
    build: ./orchestrators/loan-orchestrator
    ports:
      - "5012:5012"
    environment:
      PAYMENT_SERVICE_GRPC: payment-service:50051
      STRIPE_WRAPPER_URL: http://stripe-wrapper:5008
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      USER_SERVICE_URL: http://user-service:5000
    volumes:
      - ./shared:/app/shared
    depends_on:
      payment-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5012/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ============================================================
  # WRAPPER SERVICES
  # ============================================================

  acra-wrapper:
    build: ./wrappers/acra-wrapper
    ports:
      - "5007:5007"
    environment:
      DATA_GOV_API_URL: https://data.gov.sg/api/action/datastore_search
      ACRA_DATASET_RESOURCE_ID: d_3f960c10fed6145404ca7b821f263b87
      DATA_GOV_API_KEY: ${DATA_GOV_API_KEY}
      MOCK_UEN_VALIDATION: ${MOCK_UEN_VALIDATION:-false}
    volumes:
      - ./shared:/app/shared
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5007/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  stripe-wrapper:
    build: ./wrappers/stripe-wrapper
    ports:
      - "5008:5008"
    environment:
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_SUCCESS_URL: https://invoiceflowsga.duckdns.org/payment/success
      STRIPE_CANCEL_URL: https://invoiceflowsga.duckdns.org/payment/cancel
    volumes:
      - ./shared:/app/shared
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5008/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ============================================================
  # TEMPORAL WORKER
  # ============================================================

  temporal-worker:
    build: ./temporal-worker
    environment:
      TEMPORAL_HOST: temporal:7233
      INVOICE_SERVICE_URL: http://invoice-service:5001
      BIDDING_SERVICE_URL: http://bidding-service:5003
      MARKETPLACE_SERVICE_URL: http://marketplace-service:5002
      PAYMENT_SERVICE_GRPC: payment-service:50051
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      USER_SERVICE_URL: http://user-service:5000
      REPAYMENT_WINDOW_SECONDS: "86400"
      ANTI_SNIPE_SECONDS: "300"
      DEMO_MODE: "true"
      DEMO_REPAYMENT_WINDOW_SECONDS: "60"
    volumes:
      - ./shared:/app/shared
    depends_on:
      temporal:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  # ============================================================
  # NEW SERVICES (Section 7)
  # ============================================================

  webhook-router:
    build: ./services/webhook-router
    ports:
      - "5013:5013"
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    volumes:
      - ./shared:/app/shared
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5013/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  dlq-monitor:
    build: ./services/dlq-monitor
    ports:
      - "5014:5014"
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_MGMT_URL: http://rabbitmq:15672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5014/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ============================================================
  # MONITORING STACK (Section 8)
  # ============================================================

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  loki:
    image: grafana/loki:3.1.0
    user: root
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/config.yml
      - loki-data:/tmp/loki
    command: -config.file=/etc/loki/config.yml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  promtail:
    image: grafana/promtail:3.1.0
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy

  tempo:
    image: grafana/tempo:2.5.0
    user: root
    ports:
      - "3200:3200"   # Tempo UI / query API
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./monitoring/tempo/tempo-config.yml:/etc/tempo/config.yml
      - tempo-data:/tmp/tempo
    command: -config.file=/etc/tempo/config.yml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ============================================================
  # FRONTEND (placeholder)
  # ============================================================

  frontend:
    build: ./frontend
    expose:
      - "8080"
    depends_on:
      kong:
        condition: service_healthy

  # ============================================================
  # REVERSE PROXY (Nginx — SSL termination + routing)
  # ============================================================

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-webroot:/var/www/certbot:ro
      - /etc/letsencrypt/live/invoiceflowsga.duckdns.org/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/invoiceflowsga.duckdns.org/privkey.pem:/etc/nginx/certs/privkey.pem:ro
      - /etc/letsencrypt/archive:/etc/letsencrypt/archive:ro
    depends_on:
      - frontend
      - kong
      - notification-service

volumes:
  user-db-data:
  invoice-db-data:
  market-db-data:
  bidding-db-data:
  payment-db-data:
  temporal-db-data:
  notification-db-data:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:
  certbot-webroot:

